services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elicloudmonitor
      POSTGRES_USER: elicloud
      POSTGRES_PASSWORD: elicloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elicloud -d elicloudmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://elicloud:elicloud@postgres:5432/elicloudmonitor
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80,http://frontend"
    ports:
      - "8000:8000"
    volumes:
      - report_output:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  report_output:
